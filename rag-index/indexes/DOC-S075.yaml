title: "创业者的十个默认假设：在你研究怎么赢之前，先搞清楚怎么不死"
summary: "通过蘑菇思想实验、YouCastr失败案例和船底比喻，系统阐述创业者入场前应建立的十个默认假设。分三组：关于创意本身（创意已有人试过、禀赋效应高估、商业非物理学）、关于竞争与时机（复制时间成本低、幸存者偏误、认知带宽稀缺）、关于执行路径（想法零成本、机会在边界处、排除死法优先、信息胜于直觉）。核心论点：创业不是天才游戏，是减法游戏——先排除死法，再研究活法。"

title: "伪需求陷阱：当代理指标取代了真实价值"
summary: "当商业系统中的中间层用可度量的代理指标替代真实需求，并依赖这种替代维持运转时，系统陷入伪需求陷阱。本文通过宝洁广告欺诈、微信刷量曝光两个真实案例，揭示伪需求陷阱的四个标志；更提出反共识洞察：每个人同时是伪需求的受害者和生产者；给出识别不可持续商业模式的五问框架，帮助创业者和决策者在进入市场前识别虚假繁荣。"
